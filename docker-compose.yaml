services:

  algatransito-api:
    build:
      context: .
      dockerfile: multiDockerfile
    container_name: algatransito-api
    environment:
      DB_HOST: mysql
      DB_USER: alga
      DB_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - 8080:8080
    networks:
      - algatransito-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: algatransito
      MYSQL_USER: alga
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - algatransito-network

networks:
   algatransito-network:
     driver: bridge